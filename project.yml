name: Letychka
options:
  bundleIdPrefix: recode
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
targets:
  Letychka:
    type: application
    platform: iOS
    sources:
      - path: Letychka
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: recode.letychka32
        PRODUCT_NAME: Letychka
        INFOPLIST_FILE: Letychka/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_ENTITLEMENTS: Letychka/Letychka.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
