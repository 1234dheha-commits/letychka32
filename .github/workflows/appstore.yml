name: Upload to App Store

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: macos-26
    timeout-minutes: 60

    env:
      BUNDLE_ID: recode.letychka32
      XCODE_PROJECT: Letychka.xcodeproj
      XCODE_SCHEME: Letychka
      APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Select release Xcode (avoid beta SDK)
        run: |
          if [ -d "/Applications/Xcode_26.4.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.4.1.app/Contents/Developer
          fi
          xcodebuild -version

      - name: Install tooling
        run: |
          pip3 install --break-system-packages codemagic-cli-tools cryptography
          brew install xcodegen

      - name: Generate Xcode project (XcodeGen)
        run: xcodegen generate

      - name: Initialize keychain
        run: keychain initialize

      - name: Generate distribution key
        run: openssl genrsa -out /tmp/dist_key.pem 2048

      - name: Revoke existing IOS_DISTRIBUTION + DISTRIBUTION certs
        run: |
          set +e
          python3 <<'PY'
          import os, time, json, base64, urllib.request, urllib.error
          from cryptography.hazmat.primitives.serialization import load_pem_private_key
          from cryptography.hazmat.primitives import hashes
          from cryptography.hazmat.primitives.asymmetric import ec, utils
          key_id = os.environ['APP_STORE_CONNECT_KEY_IDENTIFIER']
          issuer = os.environ['APP_STORE_CONNECT_ISSUER_ID']
          pk = load_pem_private_key(os.environ['APP_STORE_CONNECT_PRIVATE_KEY'].encode(), password=None)
          def b64u(d): return base64.urlsafe_b64encode(d).rstrip(b'=').decode()
          h = b64u(json.dumps({"alg":"ES256","kid":key_id,"typ":"JWT"}, separators=(',', ':')).encode())
          p = b64u(json.dumps({"iss":issuer,"exp":int(time.time())+1200,"aud":"appstoreconnect-v1"}, separators=(',', ':')).encode())
          der = pk.sign(f"{h}.{p}".encode(), ec.ECDSA(hashes.SHA256()))
          r, s = utils.decode_dss_signature(der)
          token = f"{h}.{p}.{b64u(r.to_bytes(32,'big') + s.to_bytes(32,'big'))}"
          headers = {"Authorization": f"Bearer {token}"}
          for ctype in ("IOS_DISTRIBUTION", "DISTRIBUTION"):
              req = urllib.request.Request(
                  f"https://api.appstoreconnect.apple.com/v1/certificates?filter%5BcertificateType%5D={ctype}",
                  headers=headers)
              try:
                  data = json.loads(urllib.request.urlopen(req, timeout=30).read())
              except urllib.error.HTTPError as e:
                  print(f"list {ctype} err {e.code}: {e.read().decode()}"); continue
              for c in data.get('data', []):
                  cid = c['id']
                  print(f"Revoking {ctype} {cid}")
                  try:
                      urllib.request.urlopen(urllib.request.Request(
                          f"https://api.appstoreconnect.apple.com/v1/certificates/{cid}",
                          method='DELETE', headers=headers), timeout=30)
                  except urllib.error.HTTPError as e:
                      print(f"  err {e.code}: {e.read().decode()}")
          PY

      - name: Fetch App Store signing files
        run: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/dist_key.pem \
            --create

      - name: Add certificates to keychain
        run: keychain add-certificates

      - name: Apply provisioning profiles
        run: xcode-project use-profiles

      - name: Build IPA
        run: |
          BUILD_NUM=$(date +%s)
          echo "Using CURRENT_PROJECT_VERSION=$BUILD_NUM"
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags="-destination generic/platform=iOS CURRENT_PROJECT_VERSION=$BUILD_NUM"

      - name: Upload to TestFlight
        run: |
          app-store-connect publish \
            --path "build/ios/ipa/*.ipa" \
            --testflight \
            --max-build-processing-wait 20

      - name: Save IPA as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Letychka-appstore-ipa
          path: build/ios/ipa/*.ipa
          retention-days: 30

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: /tmp/xcodebuild_logs/
          retention-days: 3
